name: erp_duo_print_3d
description: ERP Duo Print 3D - Founders Edition
publish_to: "none"
version: 0.6.2+17

environment:
  sdk: ">=3.10.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.2
  go_router: ^17.3.0
  intl: ^0.20.2
  drift: ^2.34.2
  drift_flutter: ^0.3.1
  pdf: ^3.13.0
  printing: ^5.15.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.6

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/branding/app_icon.png"
  adaptive_icon_background: "#1260DC"
  adaptive_icon_foreground: "assets/branding/adaptive_foreground.png"
  min_sdk_android: 21

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#0D0D12"
  image: "assets/branding/splash_logo.png"
  image_dark: "assets/branding/splash_logo.png"
  android: true
  ios: false
  android_12:
    color: "#FFFFFF"
    color_dark: "#0D0D12"
    image: "assets/branding/adaptive_foreground.png"
    image_dark: "assets/branding/adaptive_foreground.png"
